<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Telegram Account Detail Mini App</title>

  <!-- Telegram Mini App SDK - must be loaded before your script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0f172a);
      --card: var(--tg-theme-secondary-bg-color, #111827);
      --text: var(--tg-theme-text-color, #f8fafc);
      --muted: var(--tg-theme-hint-color, #94a3b8);
      --link: var(--tg-theme-link-color, #38bdf8);
      --button: var(--tg-theme-button-color, #2481cc);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --danger: #ef4444;
      --ok: #22c55e;
      --border: rgba(148, 163, 184, 0.22);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius: 26px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.25), transparent 34%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.15), transparent 28%),
        var(--bg);
      color: var(--text);
      padding: max(18px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    }

    .app { width: min(520px, 100%); margin: 0 auto; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--button), #22c55e);
      color: #fff;
      box-shadow: var(--shadow);
      font-size: 20px;
    }

    .pill {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .card {
      background: color-mix(in srgb, var(--card) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .hero {
      padding: 26px 22px 20px;
      text-align: center;
      position: relative;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 18px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.15);
    }

    .dot.off {
      background: var(--danger);
      box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.15);
    }

    .avatar {
      width: 104px;
      height: 104px;
      margin: 0 auto 14px;
      border-radius: 32px;
      object-fit: cover;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--button), #8b5cf6);
      color: #fff;
      font-weight: 900;
      font-size: 34px;
      border: 4px solid rgba(255,255,255,0.14);
    }

    .name {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin: 0;
    }

    .username {
      margin-top: 6px;
      color: var(--link);
      font-weight: 700;
      word-break: break-word;
    }

    .grid { display: grid; gap: 10px; padding: 16px; }

    .row {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,0.04);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .label { color: var(--muted); font-size: 13px; }

    .value {
      text-align: right;
      font-weight: 800;
      word-break: break-word;
      max-width: 62%;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 16px 16px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 12px;
      font-weight: 800;
      cursor: pointer;
      background: var(--button);
      color: var(--button-text);
    }

    button.secondary {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
    }

    .notice {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      padding: 0 4px;
    }

    .raw {
      display: none;
      margin: 12px 16px 16px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(0,0,0,0.18);
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @supports not (color: color-mix(in srgb, red, blue)) {
      .card { background: var(--card); }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">✦</div>
        <span>Account Detail</span>
      </div>
      <div class="pill" id="platformPill">Telegram Mini App</div>
    </div>

    <section class="card" id="profileCard">
      <div class="hero">
        <div class="status" id="statusBadge">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">Auto login checking...</span>
        </div>

        <div id="avatar" class="avatar">TG</div>
        <h1 class="name" id="fullName">Telegram User</h1>
        <div class="username" id="username">@username</div>
      </div>

      <div class="grid" id="detailsGrid"></div>

      <div class="actions">
        <button id="copyBtn">Copy User ID</button>
        <button class="secondary" id="rawBtn">Show Raw</button>
      </div>

      <pre class="raw" id="rawBox"></pre>
    </section>

    <div class="notice">
      This Mini App auto-loads the Telegram profile only when opened inside Telegram from your bot button, menu button, or <code>t.me</code> Mini App link.
    </div>
  </main>

  <script>
    const tg = window.Telegram?.WebApp;
    const $ = (id) => document.getElementById(id);

    function safeText(value, fallback = "Not available") {
      if (value === undefined || value === null || value === "") return fallback;
      return String(value);
    }

    function initials(user) {
      const first = user?.first_name?.trim()?.[0] || "";
      const last = user?.last_name?.trim()?.[0] || "";
      const fromName = (first + last).toUpperCase();
      if (fromName) return fromName;
      if (user?.username) return user.username.slice(0, 2).toUpperCase();
      return "TG";
    }

    function boolText(value) {
      if (value === true) return "Yes";
      if (value === false) return "No";
      return "Not available";
    }

    function addRow(label, value) {
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `<div class="label"></div><div class="value"></div>`;
      row.querySelector(".label").textContent = label;
      row.querySelector(".value").textContent = safeText(value);
      $("detailsGrid").appendChild(row);
    }

    function setStatus(ok, text) {
      $("statusDot").classList.toggle("off", !ok);
      $("statusText").textContent = text;
    }

    function showOutsideTelegram() {
      setStatus(false, "Open inside Telegram");
      $("avatar").textContent = "!";
      $("fullName").textContent = "No Telegram profile found";
      $("username").textContent = "Launch this page from your bot Mini App button";
      $("detailsGrid").innerHTML = "";
      addRow("Status", "Not opened inside Telegram");
      addRow("Fix", "Open via Telegram bot web_app button/menu");
      $("platformPill").textContent = "Browser";
      $("copyBtn").disabled = true;
      $("rawBox").textContent = "Telegram.WebApp is not available.";
    }

    function renderUser() {
      if (!tg) {
        showOutsideTelegram();
        return;
      }

      tg.ready();
      tg.expand();

      try {
        tg.setHeaderColor(tg.themeParams?.secondary_bg_color || "#111827");
        tg.setBackgroundColor(tg.themeParams?.bg_color || "#0f172a");
      } catch (_) {}

      const data = tg.initDataUnsafe || {};
      const user = data.user;

      $("platformPill").textContent = `${safeText(tg.platform, "unknown")} · v${safeText(tg.version, "?")}`;

      if (!user) {
        showOutsideTelegram();
        $("rawBox").textContent = JSON.stringify(data, null, 2);
        return;
      }

      setStatus(true, "Auto logged in with Telegram");

      const firstName = safeText(user.first_name, "");
      const lastName = safeText(user.last_name, "");
      const fullName = `${firstName} ${lastName}`.trim() || "Telegram User";

      $("fullName").textContent = fullName;
      $("username").textContent = user.username ? `@${user.username}` : "No public username";

      const avatar = $("avatar");
      avatar.textContent = initials(user);

      if (user.photo_url) {
        const img = document.createElement("img");
        img.className = "avatar";
        img.id = "avatar";
        img.alt = "Telegram profile photo";
        img.src = user.photo_url;
        img.onerror = () => {
          const fallback = document.createElement("div");
          fallback.id = "avatar";
          fallback.className = "avatar";
          fallback.textContent = initials(user);
          img.replaceWith(fallback);
        };
        avatar.replaceWith(img);
      }

      $("detailsGrid").innerHTML = "";
      addRow("Telegram ID", user.id);
      addRow("First name", user.first_name);
      addRow("Last name", user.last_name);
      addRow("Username", user.username ? `@${user.username}` : "Not set");
      addRow("Language", user.language_code);
      addRow("Premium", boolText(user.is_premium));
      addRow("Added to attachment menu", boolText(user.added_to_attachment_menu));
      addRow("Allows bot write to PM", boolText(user.allows_write_to_pm));
      addRow("Start parameter", data.start_param);
      addRow("Auth date", data.auth_date ? new Date(data.auth_date * 1000).toLocaleString() : "Not available");

      $("rawBox").textContent = JSON.stringify({
        user,
        initDataUnsafe: data,
        platform: tg.platform,
        version: tg.version,
        colorScheme: tg.colorScheme,
        initData: tg.initData ? "Available - verify on backend for secure actions" : "Not available"
      }, null, 2);

      $("copyBtn").onclick = async () => {
        try {
          await navigator.clipboard.writeText(String(user.id));
          tg.HapticFeedback?.notificationOccurred?.("success");
          tg.showAlert?.("Telegram ID copied!");
        } catch (_) {
          alert("Telegram ID: " + user.id);
        }
      };
    }

    $("rawBtn").addEventListener("click", () => {
      const raw = $("rawBox");
      const visible = raw.style.display === "block";
      raw.style.display = visible ? "none" : "block";
      $("rawBtn").textContent = visible ? "Show Raw" : "Hide Raw";
    });

    renderUser();
  </script>
</body>
</html>
